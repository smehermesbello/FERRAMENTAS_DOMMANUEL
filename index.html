<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>SISTEMA DOM MANUEL - GESTÃO</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/gitbrent/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-window">
        <img src="LOGO.png" class="corner-logo" alt="Logo">

        <div id="screen-menu" class="screen">
            <h1 class="main-title">FERRAMENTAS DOM MANUEL</h1>
            <div class="button-grid">
                <button class="btn-liquid" onclick="openConfig('etiqueta')">🏷️ ETIQUETAS</button>
                <button class="btn-liquid" onclick="openConfig('carometro')">📸 CARÔMETRO</button>
                <button class="btn-liquid" onclick="openConfig('cracha')">🎫 CRACHÁ</button>
                <button class="btn-liquid" onclick="openConfig('cardapio')">🍽️ CARDÁPIO</button>
                <button class="btn-liquid" onclick="openConfig('formatacao')">📄 FORMATAÇÃO</button>
                <button class="btn-liquid" disabled style="opacity: 0.5;">📋 LISTAGEM</button>
            </div>
        </div>

        <div id="screen-config" class="screen hidden">
            <div class="glass-card">
                <button class="btn-back" onclick="showScreen('screen-menu')">← VOLTAR</button>
                <h2 id="config-title">CONFIGURAÇÃO</h2>
                
                <div class="field">
                    <label>TURNO:</label>
                    <div class="toggle-switch" onclick="toggleTurno()">
                        <div id="switch-knob"></div>
                        <span class="option">☀️ MANHÃ</span>
                        <span class="option">🌙 TARDE</span>
                    </div>
                    <input type="checkbox" id="turno-checkbox" style="display:none;">
                </div>

                <div class="field">
                    <label>FOTOS DOS ESTUDANTES:</label>
                    <input type="file" id="file-input" accept="image/*" multiple class="input-moderno">
                </div>

                <div class="field">
                    <label>TURMA:</label>
                    <input type="text" id="input-turma" placeholder="Ex: 5º ANO A" class="input-moderno">
                </div>

                <button class="btn-execute" onclick="executarGeracao()">GERAR PRÉVIA</button>
            </div>
        </div>
