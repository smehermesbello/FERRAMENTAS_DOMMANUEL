<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Formatação Escolar</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>

    <div class="main-window">
        <img src="LOGO.jpg" alt="Logo" class="top-right-logo">
        
        <div id="step-1" class="step">
            <h2>O que deseja formatar hoje?</h2>
            <div class="button-grid">
                <button onclick="goToStep(2)" class="btn-glass">Etiquetas</button>
                <button class="btn-glass" disabled>Carômetro</button>
                <button class="btn-glass" disabled>Listagem</button>
                <button class="btn-glass" disabled>Carteirinha</button>
                <button class="btn-glass" disabled>Formatação</button>
            </div>
        </div>

        <div id="step-2" class="step hidden">
            <button onclick="goToStep(1)" class="btn-back">← Voltar</button>
            <h2>Configuração de Etiquetas</h2>
            <div class="upload-box">
                <input type="file" id="upload-fotos" accept="image/*" multiple>
                <div class="turno-select">
                    <label><input type="radio" name="turno" value="manha" checked> Manhã (Amarelo)</label>
                    <label><input type="radio" name="turno" value="tarde"> Tarde (Ciano)</label>
                </div>
                <button onclick="gerarEtiquetas()" class="btn-action">Carregar Fotos</button>
            </div>
        </div>

        <div id="step-3" class="step hidden">
            <div class="toolbar">
                <button onclick="goToStep(2)" class="btn-back">← Trocar Fotos</button>
                <button onclick="imprimirPDF()" class="btn-print">Baixar PDF Final</button>
            </div>
            <div id="preview-container">
                </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
