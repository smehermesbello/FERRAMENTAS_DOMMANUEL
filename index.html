<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA DOM MANUEL - GESTÃO</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="main-window">
        <img src="LOGO.jpg" alt="Logo" class="corner-logo">
        
        <div id="screen-menu" class="screen flex-center">
            <h1 class="main-title">GESTÃO ESCOLAR</h1>
            <div class="button-grid">
                <button class="btn-main" onclick="showScreen('screen-config')">🏷️ ETIQUETAS</button>
                <button class="btn-main" disabled>📸 CARÔMETRO</button>
                <button class="btn-main" disabled>📋 LISTAGEM</button>
                <button class="btn-main" disabled>🪪 CARTEIRINHA</button>
                <button class="btn-main" disabled>🖼️ FORMATAÇÃO DE FOTOS</button>
                <button class="btn-main" disabled>🍴 FORMATAÇÃO CARDÁPIO</button>
            </div>
        </div>

        <div id="screen-config" class="screen flex-center hidden">
            <div class="config-container">
                <button class="btn-back" onclick="showScreen('screen-menu')">← VOLTAR</button>
                <h2 class="title-up">GERADOR DE ETIQUETAS</h2>
                
                <div class="field">
                    <label>1. CARREGAR FOTOS DOS ALUNOS:</label>
                    <input type="file" id="file-input" accept="image/*" multiple class="custom-file-input">
                </div>

                <div class="field">
                    <label>2. SELECIONE O TURNO:</label>
                    <div class="modern-switch">
                        <input type="radio" id="manha" name="turno" value="manha" checked>
                        <input type="radio" id="tarde" name="turno" value="tarde">
                        <div class="switch-slider"></div>
                        <label for="manha" class="switch-option">☀️ MANHÃ</label>
                        <label for="tarde" class="switch-option">🌙 TARDE</label>
                    </div>
                </div>

                <button class="btn-execute" onclick="generatePreview()">GERAR ETIQUETAS</button>
            </div>
        </div>

        <div id="screen-preview" class="screen hidden">
            <div class="preview-controls">
                <button class="btn-back-small" onclick="showScreen('screen-config')">← AJUSTAR</button>
                <button class="btn-download" onclick="downloadPDF()">BAIXAR PDF</button>
            </div>
            <div id="pdf-area"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
