<div id="screen-menu" class="screen">
    <h1 style="margin-bottom: 20px;">FERRAMENTAS DOM MANUEL</h1>
    <div class="button-grid" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; width: 100%; max-width: 900px;">
        <button class="btn-liquid" onclick="openConfig('etiqueta')">🏷️ ETIQUETAS</button>
        <button class="btn-liquid" onclick="openConfig('carometro')">📸 CARÔMETRO</button>
        <button class="btn-liquid" onclick="openConfig('cracha')">🎫 CRACHÁ</button>
        <button class="btn-liquid" onclick="openConfig('cardapio')">🍽️ CARDÁPIO</button>
        <button class="btn-liquid" onclick="openConfig('formatacao')">📄 FORMATAÇÃO</button>
        <button class="btn-liquid" disabled style="opacity:0.5">📋 LISTAGEM</button>
    </div>
</div>

<div id="screen-config" class="screen hidden">
    <div class="glass-card" style="background: rgba(255,255,255,0.2); padding: 30px; border-radius: 25px; border: 1px solid white; width: 400px;">
        <button class="btn-back" onclick="showScreen('screen-menu')" style="margin-bottom:15px; font-size:10pt;">← VOLTAR</button>
        <h2 id="config-title">CONFIGURAÇÃO</h2>
        
        <div style="margin: 20px 0;">
            <label>TURNO:</label>
            <div class="toggle-switch" onclick="toggleTurno()">
                <div id="switch-knob"></div>
                <span class="option">MANHÃ</span>
                <span class="option">TARDE</span>
            </div>
            <input type="checkbox" id="turno-checkbox" style="display:none;">
        </div>

        <div style="margin-bottom: 20px;">
            <label>FOTOS:</label>
            <input type="file" id="file-input" multiple style="width:100%; margin-top:10px;">
        </div>

        <button class="btn-execute" onclick="executarGeracao()" style="width:100%; background:#27ae60; color:white;">GERAR PRÉVIA</button>
    </div>
</div>
