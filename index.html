<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Formatação Escolar - Dom Manuel</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>

    <div class="glass-container">
        <header class="glass-header">
            <img src="LOGO.jpg" alt="Logo" class="main-logo">
            <h1>Painel de Controle</h1>
        </header>
        
        <nav class="glass-nav">
            <button onclick="showEtiquetas()" class="btn-glass">Etiqueta</button>
            <button class="btn-glass">Carômetro</button>
            <button class="btn-glass">Listagem</button>
            <button class="btn-glass">Carteirinha</button>
            <button class="btn-glass">Formatação</button>
        </nav>

        <div id="etiquetas-controls" class="controls-area hidden">
            <input type="file" id="upload-fotos" accept="image/*" multiple>
            <div class="options">
                <label><input type="radio" name="turno" value="manha" checked> Manhã</label>
                <label><input type="radio" name="turno" value="tarde"> Tarde</label>
            </div>
            <button onclick="gerarEtiquetas()" class="btn-action">Gerar Etiquetas</button>
            <button onclick="imprimirPDF()" class="btn-print">Baixar PDF A4</button>
        </div>
    </div>

    <div id="pdf-content">
        </div>

    <script src="script.js"></script>
</body>
</html>
