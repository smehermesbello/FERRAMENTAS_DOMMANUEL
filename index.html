<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Escolar - Dom Manuel</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>

    <div class="main-window">
        <img src="LOGO.jpg" alt="Logo" class="corner-logo">
        
        <div id="screen-menu" class="screen">
            <h1 class="glass-title">Painel de Formatação</h1>
            <div class="button-container">
                <button class="btn-main" onclick="showScreen('screen-config')">Etiqueta</button>
                <button class="btn-main" disabled title="Em breve">Carômetro</button>
                <button class="btn-main" disabled title="Em breve">Listagem</button>
                <button class="btn-main" disabled title="Em breve">Carteirinha</button>
                <button class="btn-main" disabled title="Em breve">Formatação</button>
            </div>
        </div>

        <div id="screen-config" class="screen hidden">
            <button class="btn-back" onclick="showScreen('screen-menu')">← Voltar</button>
            <h2>Configuração de Etiquetas</h2>
            
            <div class="config-form">
                <div class="input-group">
                    <label>Selecione as Imagens dos Alunos:</label>
                    <input type="file" id="file-input" accept="image/*" multiple>
                </div>
                
                <div class="input-group">
                    <label>Selecione o Turno:</label>
                    <div class="radio-group">
                        <label><input type="radio" name="turno" value="manha" checked> Manhã (Verde)</label>
                        <label><input type="radio" name="turno" value="tarde"> Tarde (Azul)</label>
                    </div>
                </div>

                <button class="btn-action" onclick="generatePreview()">Ver Resultados</button>
            </div>
        </div>

        <div id="screen-preview" class="screen hidden">
            <div class="preview-header">
                <button class="btn-back" onclick="showScreen('screen-config')">← Configurações</button>
                <button class="btn-print" onclick="downloadPDF()">Baixar PDF Final</button>
            </div>
            
            <div id="pdf-area">
                </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
