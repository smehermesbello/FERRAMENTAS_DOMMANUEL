<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Formatação Escolar - Dom Manuel</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>

    <div class="main-window">
        <img src="LOGO.jpg" alt="Logo" class="corner-logo">
        
        <div id="screen-menu" class="screen flex-center">
            <h1 class="main-title">GESTÃO ESCOLAR</h1>
            <p class="subtitle">Escolha o módulo de formatação</p>
            
            <div class="button-grid">
                <button class="btn-main glass-effect" onclick="showScreen('screen-config')">
                    <span class="icon">🏷️</span>
                    Etiquetas
                </button>
                <button class="btn-main glass-effect" disabled>
                    <span class="icon">📸</span>
                    Carômetro
                </button>
                <button class="btn-main glass-effect" disabled>
                    <span class="icon">📋</span>
                    Listagem
                </button>
                <button class="btn-main glass-effect" disabled>
                    <span class="icon">🪪</span>
                    Carteirinha
                </button>
            </div>
            <div class="bottom-info">Escola Municipal Dom Manuel da Silveira D’Elboux</div>
        </div>

        <div id="screen-config" class="screen flex-center hidden">
            <button class="btn-back" onclick="showScreen('screen-menu')">← VOLTAR AO MENU</button>
            <h2 class="section-title">Configurar Etiquetas</h2>
            
            <div class="config-container glass-effect">
                <div class="config-item">
                    <label>1. Envie as fotos dos alunos:</label>
                    <input type="file" id="file-input" accept="image/*" multiple>
                    <small>Dica: O nome do arquivo será o nome na etiqueta.</small>
                </div>

                <div class="config-item">
                    <label>2. Selecione o Turno:</label>
                    <div class="turno-selector">
                        <label class="turno-card">
                            <input type="radio" name="turno" value="manha" checked>
                            <span class="card-content">☀️ Manhã</span>
                        </label>
                        <label class="turno-card">
                            <input type="radio" name="turno" value="tarde">
                            <span class="card-content">🌙 Tarde</span>
                        </label>
                    </div>
                </div>

                <button class="btn-execute" onclick="generatePreview()">GERAR E VISUALIZAR RESULTADOS</button>
            </div>
        </div>

        <div id="screen-preview" class="screen hidden">
            <div class="preview-controls">
                <button class="btn-back-small" onclick="showScreen('screen-config')">← Ajustar</button>
                <h2 class="preview-title">Revisão de Etiquetas</h2>
                <button class="btn-download" onclick="downloadPDF()">BAIXAR PDF FINAL</button>
            </div>
            
            <p class="edit-hint">Clique nos nomes abaixo para editar se necessário.</p>
            
            <div id="pdf-area">
                </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
